services:
  # Development-only database. Do not use these credentials in production.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pathtex
      POSTGRES_USER: pathtex
      POSTGRES_PASSWORD: pathtex
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pathtex -d pathtex']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
